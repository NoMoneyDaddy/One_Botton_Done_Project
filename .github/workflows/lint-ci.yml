name: Lint and CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm ci || npm install
      
    - name: Check ESLint configuration
      id: eslint-check
      run: |
        if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ] || [ -f "eslint.config.js" ] || [ -f ".eslintrc" ]; then
          echo "ESLint config found"
          echo "has_eslint=true" >> $GITHUB_OUTPUT
        else
          echo "No ESLint config found"
          echo "has_eslint=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Run ESLint
      if: steps.eslint-check.outputs.has_eslint == 'true'
      run: npm run lint --if-present || npx eslint . --ext .js,.jsx,.ts,.tsx
      continue-on-error: true
      
    - name: Check Prettier configuration
      id: prettier-check
      run: |
        if [ -f ".prettierrc" ] || [ -f ".prettierrc.js" ] || [ -f ".prettierrc.json" ] || [ -f "prettier.config.js" ]; then
          echo "Prettier config found"
          echo "has_prettier=true" >> $GITHUB_OUTPUT
        else
          echo "No Prettier config found"
          echo "has_prettier=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Run Prettier Check
      if: steps.prettier-check.outputs.has_prettier == 'true'
      run: npm run format:check --if-present || npx prettier --check "**/*.{js,jsx,ts,tsx,json,md,css}"
      continue-on-error: true
      
    - name: Check TypeScript configuration
      id: ts-check
      run: |
        if [ -f "tsconfig.json" ]; then
          echo "TypeScript config found"
          echo "has_ts=true" >> $GITHUB_OUTPUT
        else
          echo "No TypeScript config found"
          echo "has_ts=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Run TypeScript Type Check
      if: steps.ts-check.outputs.has_ts == 'true'
      run: npm run type-check --if-present || npx tsc --noEmit
      continue-on-error: true
      
    - name: Run Tests
      run: npm test --if-present
      continue-on-error: true

  zeabur-deploy-check:
    needs: lint-and-type-check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - name: Deployment Notice
      run: |
        echo "✅ CI checks completed."
        echo "🚀 If Zeabur GitHub App is installed, deployment should start automatically."
        echo "Check deployment status at: https://zeabur.com/projects"
